const StatusBadge = ({ status }) => {
  const config = {
    active: { label: "Active", bg: BRAND.greenSoft, color: BRAND.green, icon: "check" },
    pending: { label: "Pending", bg: BRAND.amberSoft, color: BRAND.amber, icon: "clock" },
    pending_kyc: { label: "Awaiting KYC", bg: BRAND.amberSoft, color: BRAND.amber, icon: "clock" },
    invited: { label: "Invited", bg: "rgba(99,102,241,0.1)", color: "#6366f1", icon: "mail" },
    failed: { label: "Failed", bg: BRAND.redSoft, color: BRAND.red, icon: "clock" },
  };
  const c = config[status] || config.pending;
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "4px 10px", borderRadius: 20, background: c.bg, color: c.color, fontSize: 12, fontWeight: 600, letterSpacing: 0.3 }}>
      <Icon name={c.icon} size={13} color={c.color} />{c.label}
    </span>
  );
};

const StatCard = ({ icon, label, value, accent }) => (
  <div style={{ flex: "1 1 180px", padding: "20px 22px", background: BRAND.white, borderRadius: 14, border: `1px solid ${BRAND.gray100}`, display: "flex", alignItems: "center", gap: 16 }}>
    <div style={{ width: 44, height: 44, borderRadius: 12, background: accent || BRAND.pinkSoft, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <Icon name={icon} size={22} color={accent ? BRAND.white : BRAND.pink} />
    </div>
    <div>
      <div style={{ fontSize: 26, fontWeight: 700, color: BRAND.navy, lineHeight: 1.1 }}>{value}</div>
      <div style={{ fontSize: 12, color: BRAND.gray400, fontWeight: 500, marginTop: 2, letterSpacing: 0.3 }}>{label}</div>
    </div>
  </div>
);

const ImportModal = ({ onClose, onImport }) => {
  const [csvText, setCsvText] = useState(CSV_EXAMPLE);
  const [parsed, setParsed] = useState([]);
  const [step, setStep] = useState("input");
  const fileRef = useRef(null);

  const parseCSV = (text) => {
    const lines = text.trim().split("\n");
    if (lines.length < 2) return [];
    const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
    return lines.slice(1).map((line, i) => {
      const vals = line.split(",").map(v => v.trim());
      const nameIdx = headers.findIndex(h => h === "name" || h === "namn");
      const pnrIdx = headers.findIndex(h => h.includes("personal") || h.includes("personnummer"));
      const emailIdx = headers.findIndex(h => h === "email");
      return { id: `imp_${Date.now()}_${i}`, name: vals[nameIdx >= 0 ? nameIdx : 0] || "", pnr: vals[pnrIdx >= 0 ? pnrIdx : 1] || "", email: vals[emailIdx >= 0 ? emailIdx : 2] || "", poaSigned: false, kycDone: false, status: "invited" };
    }).filter(e => e.name);
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 1000, background: "rgba(10, 19, 71, 0.6)", backdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "center", animation: "fadeIn 0.2s ease" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: BRAND.white, borderRadius: 20, width: "min(580px, 92vw)", maxHeight: "85vh", overflow: "auto", boxShadow: "0 24px 80px rgba(16, 29, 107, 0.25)" }}>
        <div style={{ padding: "24px 28px 16px", borderBottom: `1px solid ${BRAND.gray100}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <h3 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: BRAND.navy }}>{step === "done" ? "Import Complete!" : "Import Employees"}</h3>
            <p style={{ margin: "4px 0 0", fontSize: 13, color: BRAND.gray400 }}>
              {step === "input" && "Paste CSV data or upload a file"}
              {step === "preview" && `${parsed.length} employees found — review before importing`}
              {step === "done" && "BankID invitations are being sent via email"}
            </p>
          </div>
          <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: 8, border: "none", background: BRAND.gray50, cursor: "pointer", fontSize: 18, color: BRAND.gray400 }}>×</button>
        </div>
        <div style={{ padding: "20px 28px 28px" }}>
          {step === "input" && <>
            <div style={{ border: `2px dashed ${BRAND.pinkBorder}`, borderRadius: 14, padding: 28, textAlign: "center", marginBottom: 16, background: BRAND.pinkSoft, cursor: "pointer" }} onClick={() => fileRef.current?.click()}>
              <Icon name="upload" size={32} color={BRAND.pink} />
              <p style={{ margin: "10px 0 4px", fontWeight: 600, color: BRAND.navy, fontSize: 14 }}>Drag & drop a CSV file here</p>
              <p style={{ margin: 0, fontSize: 12, color: BRAND.gray400 }}>or click to browse</p>
              <input ref={fileRef} type="file" accept=".csv" style={{ display: "none" }} onChange={e => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = ev => setCsvText(ev.target.result); r.readAsText(f); } }} />
            </div>
            <label style={{ fontSize: 12, fontWeight: 600, color: BRAND.gray600, letterSpacing: 0.3, display: "block", marginBottom: 4 }}>CSV DATA</label>
            <textarea value={csvText} onChange={e => setCsvText(e.target.value)} style={{ width: "100%", height: 130, fontFamily: "'JetBrains Mono', 'Fira Code', monospace", fontSize: 12, lineHeight: 1.6, padding: 14, borderRadius: 10, border: `1px solid ${BRAND.gray200}`, background: BRAND.gray50, resize: "vertical", outline: "none", boxSizing: "border-box" }} onFocus={e => e.target.style.borderColor = BRAND.pink} onBlur={e => e.target.style.borderColor = BRAND.gray200} />
            <p style={{ fontSize: 11, color: BRAND.gray300, margin: "6px 0 18px" }}>Format: name, personal_number, email — one row per employee</p>
            <button onClick={() => { setParsed(parseCSV(csvText)); setStep("preview"); }} style={{ width: "100%", padding: "13px 0", borderRadius: 12, background: BRAND.navy, color: BRAND.white, border: "none", fontWeight: 700, fontSize: 14, cursor: "pointer", letterSpacing: 0.3 }} onMouseEnter={e => e.target.style.background = BRAND.navyLight} onMouseLeave={e => e.target.style.background = BRAND.navy}>Preview Import</button>
          </>}
          {step === "preview" && <>
            <div style={{ borderRadius: 12, border: `1px solid ${BRAND.gray100}`, overflow: "hidden", marginBottom: 18 }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead><tr style={{ background: BRAND.gray50 }}>{["Name", "Personal Number", "Email", "Status"].map(h => <th key={h} style={{ padding: "10px 14px", textAlign: "left", fontWeight: 600, color: BRAND.gray600, fontSize: 11, letterSpacing: 0.5, textTransform: "uppercase" }}>{h}</th>)}</tr></thead>
                <tbody>{parsed.map((emp, i) => <tr key={i} style={{ borderTop: `1px solid ${BRAND.gray100}` }}><td style={{ padding: "10px 14px", fontWeight: 600, color: BRAND.navy }}>{emp.name}</td><td style={{ padding: "10px 14px", color: BRAND.gray600, fontFamily: "monospace", fontSize: 12 }}>{emp.pnr}</td><td style={{ padding: "10px 14px", color: BRAND.gray400 }}>{emp.email}</td><td style={{ padding: "10px 14px" }}><StatusBadge status="invited" /></td></tr>)}</tbody>
              </table>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setStep("input")} style={{ flex: 1, padding: "13px 0", borderRadius: 12, background: BRAND.gray50, color: BRAND.gray600, border: `1px solid ${BRAND.gray200}`, fontWeight: 600, fontSize: 14, cursor: "pointer" }}>Back</button>
              <button onClick={() => { onImport(parsed); setStep("done"); setTimeout(onClose, 1400); }} style={{ flex: 2, padding: "13px 0", borderRadius: 12, background: `linear-gradient(135deg, ${BRAND.pink}, ${BRAND.pinkLight})`, color: BRAND.white, border: "none", fontWeight: 700, fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}><Icon name="send" size={16} color={BRAND.white} /> Import & Send Invitations</button>
            </div>
          </>}
          {step === "done" && <div style={{ textAlign: "center", padding: "20px 0" }}>
            <div style={{ width: 64, height: 64, borderRadius: "50%", background: BRAND.greenSoft, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" }}><Icon name="check" size={32} color={BRAND.green} /></div>
            <p style={{ fontWeight: 700, color: BRAND.navy, fontSize: 16 }}>{parsed.length} employees imported!</p>
            <p style={{ color: BRAND.gray400, fontSize: 13 }}>BankID invitations are being sent via email.</p>
          </div>}
        </div>
      </div>
    </div>
  );
};

const AddCompanyModal = ({ onClose, onAdd }) => {
  const [form, setForm] = useState({ name: "", orgNr: "", sector: "", plan: "ITP1", contactName: "", contactEmail: "" });
  const handleSubmit = () => { if (!form.name || !form.orgNr) return; onAdd({ ...form, id: `c_${Date.now()}`, status: "pending", createdAt: new Date().toISOString().split("T")[0], employeeCount: 0 }); onClose(); };
  const Field = ({ label, field, placeholder, half }) => (
    <div style={{ flex: half ? "1 1 45%" : "1 1 100%", minWidth: half ? 200 : "auto" }}>
      <label style={{ fontSize: 11, fontWeight: 600, color: BRAND.gray600, letterSpacing: 0.5, textTransform: "uppercase", display: "block", marginBottom: 6 }}>{label}</label>
      <input value={form[field]} onChange={e => setForm({ ...form, [field]: e.target.value })} placeholder={placeholder} style={{ width: "100%", padding: "10px 14px", borderRadius: 10, fontSize: 14, border: `1px solid ${BRAND.gray200}`, outline: "none", boxSizing: "border-box" }} onFocus={e => e.target.style.borderColor = BRAND.pink} onBlur={e => e.target.style.borderColor = BRAND.gray200} />
    </div>
  );
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 1000, background: "rgba(10, 19, 71, 0.6)", backdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "center" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: BRAND.white, borderRadius: 20, width: "min(520px, 92vw)", boxShadow: "0 24px 80px rgba(16, 29, 107, 0.25)" }}>
        <div style={{ padding: "24px 28px 16px", borderBottom: `1px solid ${BRAND.gray100}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <h3 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: BRAND.navy }}>Add Company</h3>
            <p style={{ margin: "4px 0 0", fontSize: 13, color: BRAND.gray400 }}>Register a new employer organization</p>
          </div>
          <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: 8, border: "none", background: BRAND.gray50, cursor: "pointer", fontSize: 18, color: BRAND.gray400 }}>×</button>
        </div>
        <div style={{ padding: "20px 28px 28px", display: "flex", flexWrap: "wrap", gap: 14 }}>
          <Field label="Company Name" field="name" placeholder="AB Företaget" />
          <Field label="Organization Number" field="orgNr" placeholder="556XXX-XXXX" half />
          <Field label="Industry" field="sector" placeholder="Fintech, Automotive..." half />
          <div style={{ flex: "1 1 100%" }}>
            <label style={{ fontSize: 11, fontWeight: 600, color: BRAND.gray600, letterSpacing: 0.5, textTransform: "uppercase", display: "block", marginBottom: 6 }}>Pension Agreement</label>
            <select value={form.plan} onChange={e => setForm({ ...form, plan: e.target.value })} style={{ width: "100%", padding: "10px 14px", borderRadius: 10, fontSize: 14, border: `1px solid ${BRAND.gray200}`, outline: "none", boxSizing: "border-box", background: BRAND.white }}>
              <option value="ITP1">ITP1</option><option value="ITP1 + ITPK">ITP1 + ITPK</option><option value="SAF-LO">SAF-LO</option><option value="Other">Other</option>
            </select>
          </div>
          <Field label="Contact Person" field="contactName" placeholder="First Last" half />
          <Field label="Contact Email" field="contactEmail" placeholder="admin@company.se" half />
          <button onClick={handleSubmit} style={{ width: "100%", padding: "13px 0", borderRadius: 12, marginTop: 6, background: BRAND.navy, color: BRAND.white, border: "none", fontWeight: 700, fontSize: 14, cursor: "pointer", letterSpacing: 0.3, opacity: (!form.name || !form.orgNr) ? 0.4 : 1, pointerEvents: (!form.name || !form.orgNr) ? "none" : "auto" }}>Register Company</button>
        </div>
      </div>
    </div>
  );
};

const CompanyDetail = ({ company, employees, onBack, onImport, onResend }) => {
  const activeCount = employees.filter(e => e.status === "active").length;
  const pendingCount = employees.filter(e => e.status !== "active").length;
  const poaRate = employees.length ? Math.round((employees.filter(e => e.poaSigned).length / employees.length) * 100) : 0;

  return (
    <div>
      <button onClick={onBack} style={{ display: "flex", alignItems: "center", gap: 6, background: "none", border: "none", cursor: "pointer", color: BRAND.gray400, fontWeight: 600, fontSize: 13, padding: 0, marginBottom: 20 }}>
        <Icon name="back" size={16} color={BRAND.gray400} /> All Companies
      </button>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 16, marginBottom: 24 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <h2 style={{ margin: 0, fontSize: 24, fontWeight: 800, color: BRAND.navy }}>{company.name}</h2>
            <StatusBadge status={company.status} />
          </div>
          <p style={{ margin: "4px 0 0", color: BRAND.gray400, fontSize: 13 }}>Org. nr: {company.orgNr} · {company.plan} · {company.sector} · Contact: {company.contactName}</p>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          {employees.some(e => e.status === "invited") && <button onClick={onResend} style={{ padding: "10px 18px", borderRadius: 10, background: BRAND.white, color: BRAND.navy, border: `1px solid ${BRAND.gray200}`, fontWeight: 600, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", gap: 7 }}><Icon name="resend" size={15} color={BRAND.navy} /> Resend Invites</button>}
          <button onClick={onImport} style={{ padding: "10px 20px", borderRadius: 10, background: `linear-gradient(135deg, ${BRAND.pink}, ${BRAND.pinkLight})`, color: BRAND.white, border: "none", fontWeight: 700, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", gap: 8, boxShadow: "0 4px 16px rgba(255, 47, 145, 0.3)" }}><Icon name="upload" size={16} color={BRAND.white} /> Import Employees</button>
        </div>
      </div>

      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginBottom: 28 }}>
        <StatCard icon="users" label="TOTAL EMPLOYEES" value={employees.length} />
        <StatCard icon="check" label="ACTIVE" value={activeCount} accent={BRAND.green} />
        <StatCard icon="clock" label="PENDING" value={pendingCount} accent={BRAND.amber} />
        <StatCard icon="chart" label="POA SIGN RATE" value={`${poaRate}%`} />
      </div>

      <div style={{ marginBottom: 28, padding: "18px 22px", background: BRAND.white, borderRadius: 14, border: `1px solid ${BRAND.gray100}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: BRAND.navy }}>Onboarding Progress</span>
          <span style={{ fontSize: 13, fontWeight: 700, color: BRAND.pink }}>{poaRate}%</span>
        </div>
        <div style={{ height: 8, borderRadius: 4, background: BRAND.gray100, overflow: "hidden" }}>
          <div style={{ height: "100%", borderRadius: 4, background: `linear-gradient(90deg, ${BRAND.pink}, ${BRAND.pinkLight})`, width: `${poaRate}%`, transition: "width 0.6s ease" }} />
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, fontSize: 11, color: BRAND.gray300 }}>
          <span>Invite Sent</span><span>POA Signed</span><span>KYC Complete</span><span>Active</span>
        </div>
      </div>

      {employees.length > 0 ? (
        <div style={{ borderRadius: 14, border: `1px solid ${BRAND.gray100}`, overflow: "hidden", background: BRAND.white }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead><tr style={{ background: BRAND.gray50 }}>{["Employee", "Personal Number", "Email", "POA", "KYC", "Status"].map(h => <th key={h} style={{ padding: "12px 16px", textAlign: "left", fontWeight: 600, color: BRAND.gray400, fontSize: 10.5, letterSpacing: 0.8, textTransform: "uppercase" }}>{h}</th>)}</tr></thead>
            <tbody>{employees.map(emp => (
              <tr key={emp.id} style={{ borderTop: `1px solid ${BRAND.gray100}`, transition: "background 0.15s" }} onMouseEnter={e => e.currentTarget.style.background = BRAND.gray50} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                <td style={{ padding: "12px 16px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 34, height: 34, borderRadius: 10, background: `linear-gradient(135deg, ${BRAND.navy}, ${BRAND.navyLight})`, display: "flex", alignItems: "center", justifyContent: "center", color: BRAND.white, fontWeight: 700, fontSize: 13 }}>{emp.name.split(" ").map(n => n[0]).join("")}</div>
                    <span style={{ fontWeight: 600, color: BRAND.navy, fontSize: 13.5 }}>{emp.name}</span>
                  </div>
                </td>
                <td style={{ padding: "12px 16px", fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: BRAND.gray400 }}>{emp.pnr.substring(0, 6)}-****</td>
                <td style={{ padding: "12px 16px", color: BRAND.gray400, fontSize: 13 }}>{emp.email}</td>
                <td style={{ padding: "12px 16px" }}><div style={{ width: 24, height: 24, borderRadius: 6, background: emp.poaSigned ? BRAND.greenSoft : BRAND.gray100, display: "flex", alignItems: "center", justifyContent: "center" }}>{emp.poaSigned && <Icon name="check" size={14} color={BRAND.green} />}</div></td>
                <td style={{ padding: "12px 16px" }}><div style={{ width: 24, height: 24, borderRadius: 6, background: emp.kycDone ? BRAND.greenSoft : BRAND.gray100, display: "flex", alignItems: "center", justifyContent: "center" }}>{emp.kycDone && <Icon name="check" size={14} color={BRAND.green} />}</div></td>
                <td style={{ padding: "12px 16px" }}><StatusBadge status={emp.status} /></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      ) : (
        <div style={{ padding: "48px 0", textAlign: "center", background: BRAND.white, borderRadius: 14, border: `1px solid ${BRAND.gray100}` }}>
          <Icon name="users" size={40} color={BRAND.gray200} />
          <p style={{ fontWeight: 700, color: BRAND.navy, fontSize: 15, margin: "14px 0 4px" }}>No employees yet</p>
          <p style={{ color: BRAND.gray400, fontSize: 13, margin: 0 }}>Import employees via CSV to get started</p>
        </div>
      )}
    </div>
  );
};

function App() {
  const [companies, setCompanies] = useState(MOCK_COMPANIES);
  const [employees, setEmployees] = useState(MOCK_EMPLOYEES);
  const [selectedCompany, setSelectedCompany] = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [showAddCompany, setShowAddCompany] = useState(false);
  const [search, setSearch] = useState("");
  const [mounted, setMounted] = useState(false);
  const [toast, setToast] = useState(null);

  useEffect(() => { setMounted(true); }, []);
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };

  const totalEmployees = Object.values(employees).flat().length;
  const activeEmployees = Object.values(employees).flat().filter(e => e.status === "active").length;
  const filteredCompanies = companies.filter(c => c.name.toLowerCase().includes(search.toLowerCase()) || c.orgNr.includes(search));

  const handleImport = (newEmps) => {
    if (!selectedCompany) return;
    setEmployees(prev => ({ ...prev, [selectedCompany.id]: [...(prev[selectedCompany.id] || []), ...newEmps] }));
    showToast(`${newEmps.length} employees imported successfully`);
  };
  const handleAddCompany = (nc) => { setCompanies(prev => [nc, ...prev]); setEmployees(prev => ({ ...prev, [nc.id]: [] })); showToast(`${nc.name} registered`); };
  const handleResend = () => { if (!selectedCompany) return; const n = (employees[selectedCompany.id] || []).filter(e => e.status === "invited").length; showToast(`Resent ${n} invitation${n !== 1 ? "s" : ""}`); };

  return (
    <div style={{ minHeight: "100vh", background: BRAND.gray50, fontFamily: "'DM Sans', 'Segoe UI', system-ui, sans-serif", opacity: mounted ? 1 : 0, transition: "opacity 0.4s" }}>
      {toast && <div style={{ position: "fixed", bottom: 28, left: "50%", transform: "translateX(-50%)", zIndex: 2000, padding: "12px 24px", borderRadius: 12, background: BRAND.navy, color: BRAND.white, fontSize: 13, fontWeight: 600, boxShadow: "0 8px 32px rgba(16, 29, 107, 0.3)", display: "flex", alignItems: "center", gap: 10, animation: "toastIn 0.25s ease" }}><Icon name="check" size={16} color={BRAND.green} />{toast}</div>}

      <header style={{ background: BRAND.navy, padding: "0 32px", height: 64, display: "flex", alignItems: "center", justifyContent: "space-between", boxShadow: "0 2px 20px rgba(16, 29, 107, 0.3)", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 36, height: 36, borderRadius: 10, background: `linear-gradient(135deg, ${BRAND.pink}, ${BRAND.pinkLight})`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, color: BRAND.white, fontSize: 18 }}>P</div>
          <div>
            <span style={{ color: BRAND.white, fontWeight: 700, fontSize: 16, letterSpacing: -0.3 }}>Pensionera</span>
            <span style={{ marginLeft: 10, padding: "2px 8px", borderRadius: 4, background: "rgba(255,255,255,0.12)", color: "rgba(255,255,255,0.7)", fontSize: 10, fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase" }}>Employer Portal</span>
          </div>
        </div>
        <div style={{ width: 34, height: 34, borderRadius: 10, background: "rgba(255,255,255,0.12)", display: "flex", alignItems: "center", justifyContent: "center", color: BRAND.white, fontWeight: 700, fontSize: 13 }}>GA</div>
      </header>

      <main style={{ maxWidth: 1080, margin: "0 auto", padding: "28px 24px 60px" }}>
        {selectedCompany ? <>
          <CompanyDetail company={selectedCompany} employees={employees[selectedCompany.id] || []} onBack={() => setSelectedCompany(null)} onImport={() => setShowImport(true)} onResend={handleResend} />
          {showImport && <ImportModal onClose={() => setShowImport(false)} onImport={handleImport} />}
        </> : <>
          <div style={{ marginBottom: 24 }}>
            <h1 style={{ margin: 0, fontSize: 26, fontWeight: 800, color: BRAND.navy, letterSpacing: -0.5 }}>Company Overview</h1>
            <p style={{ margin: "4px 0 0", color: BRAND.gray400, fontSize: 14 }}>Manage employer organizations and employee pension onboarding</p>
          </div>

          <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginBottom: 28 }}>
            <StatCard icon="building" label="COMPANIES" value={companies.length} />
            <StatCard icon="users" label="EMPLOYEES" value={totalEmployees} />
            <StatCard icon="check" label="ACTIVE" value={activeEmployees} accent={BRAND.green} />
            <StatCard icon="chart" label="ACTIVATION RATE" value={totalEmployees ? `${Math.round((activeEmployees / totalEmployees) * 100)}%` : "0%"} />
          </div>

          <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
            <div style={{ flex: "1 1 280px", position: "relative" }}>
              <div style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)" }}><Icon name="search" size={17} color={BRAND.gray300} /></div>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by company name or org. number..." style={{ width: "100%", padding: "11px 14px 11px 40px", borderRadius: 10, border: `1px solid ${BRAND.gray200}`, fontSize: 13.5, outline: "none", background: BRAND.white }} onFocus={e => e.target.style.borderColor = BRAND.pink} onBlur={e => e.target.style.borderColor = BRAND.gray200} />
            </div>
            <button onClick={() => setShowAddCompany(true)} style={{ padding: "11px 20px", borderRadius: 10, background: BRAND.navy, color: BRAND.white, border: "none", fontWeight: 700, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", gap: 8, letterSpacing: 0.2 }}><Icon name="plus" size={16} color={BRAND.white} /> Add Company</button>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {filteredCompanies.map((company, i) => (
              <div key={company.id} onClick={() => setSelectedCompany(company)} style={{ background: BRAND.white, borderRadius: 14, padding: "18px 22px", border: `1px solid ${BRAND.gray100}`, cursor: "pointer", transition: "all 0.2s", display: "flex", alignItems: "center", justifyContent: "space-between", animation: `fadeIn 0.3s ease ${i * 0.05}s both` }} onMouseEnter={e => { e.currentTarget.style.borderColor = BRAND.pinkBorder; e.currentTarget.style.boxShadow = "0 4px 20px rgba(255, 47, 145, 0.08)"; }} onMouseLeave={e => { e.currentTarget.style.borderColor = BRAND.gray100; e.currentTarget.style.boxShadow = "none"; }}>
                <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                  <div style={{ width: 44, height: 44, borderRadius: 12, background: `linear-gradient(135deg, ${BRAND.navy}, ${BRAND.navyLight})`, display: "flex", alignItems: "center", justifyContent: "center", color: BRAND.white, fontWeight: 800, fontSize: 16, flexShrink: 0 }}>{company.name.charAt(0)}</div>
                  <div>
                    <div style={{ fontWeight: 700, color: BRAND.navy, fontSize: 15 }}>{company.name}</div>
                    <div style={{ fontSize: 12, color: BRAND.gray400, marginTop: 2 }}>{company.orgNr} · {company.plan} · {company.sector}</div>
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 18, fontWeight: 700, color: BRAND.navy }}>{(employees[company.id] || []).length}</div>
                    <div style={{ fontSize: 10.5, color: BRAND.gray300, textTransform: "uppercase", letterSpacing: 0.5, fontWeight: 500 }}>employees</div>
                  </div>
                  <StatusBadge status={company.status} />
                  <Icon name="chevron" size={18} color={BRAND.gray300} />
                </div>
              </div>
            ))}
          </div>

          {filteredCompanies.length === 0 && <div style={{ padding: "48px 0", textAlign: "center", background: BRAND.white, borderRadius: 14, border: `1px solid ${BRAND.gray100}` }}><Icon name="search" size={40} color={BRAND.gray200} /><p style={{ fontWeight: 700, color: BRAND.navy, fontSize: 15, margin: "14px 0 4px" }}>No companies found</p><p style={{ color: BRAND.gray400, fontSize: 13, margin: 0 }}>Try a different search or add a new company</p></div>}
          {showAddCompany && <AddCompanyModal onClose={() => setShowAddCompany(false)} onAdd={handleAddCompany} />}
        </>}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
